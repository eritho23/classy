root = "."
tmp_dir = "tmp"

[build]
  pre_cmd = ["templ generate", "sqlc generate"]
  cmd = "go build -o ./target/classy ./cmd/classy/main.go"
  bin = "./target/classy"
  full_bin = "./target/classy"
  include_ext = ["go", "templ", "html", "css", "js"]
  exclude_regex = ["_templ\\.go$"]
  exclude_dir = [
    "target",
    "tmp",
    "internal/generated",
    "migrations",
    "nix",
    ".git",
  ]
  include_dir = []
  delay = 2000
  send_interrupt = false
  kill_delay = "5s"
  log = "build-errors.log"

[log]
  time = true
  main_only = false

[color]
  main     = "magenta"
  watcher  = "cyan"
  build    = "yellow"
  runner   = "green"

[misc]
  clean_on_exit = true
